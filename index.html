<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ ZR</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .wrap {
      max-width: 700px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    p {
      font-size: 20px;
      line-height: 1.6;
      color: #ddd;
    }
    a {
      color: #fff;
      text-decoration: none;
      border: 1px solid #fff;
      padding: 12px 20px;
      display: inline-block;
      margin: 10px 8px 0;
      border-radius: 6px;
    }
    a:hover {
      background: #fff;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DJ ZR</h1>
    <p>Mainstage energy, festival vibes, and fresh mixes.</p>
    <p>
      <a href="https://www.youtube.com/" target="_blank">YouTube</a>
      <a href="https://www.mixcloud.com/" target="_blank">Mixcloud</a>
    </p>
  </div>
</body>
</html>
